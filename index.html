<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Circus - Escape the Confinement</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #040814; /* Das vertraute edle Dunkelblau */
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
        }
        
        /* Dezente Anleitung oben */
        .instructions {
            position: absolute;
            top: 5%;
            width: 100%;
            text-align: center;
            color: #5c697a;
            font-size: 0.95rem;
            letter-spacing: 1px;
            line-height: 1.6;
            pointer-events: none;
            z-index: 10;
        }

        .game-title {
            display: block;
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .highlight {
            color: #ffb703; /* Warmes Orange/Gold */
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="instructions">
    <span class="game-title">The Circus</span>
    The system is trapped in chaotic confinement.<br>
    <span class="highlight">CLICK ON A MONKEY</span> to release them from the tent into freedom.
</div>

<script>
let monkeys = [];
let totalMonkeys = 12; 
let cageRadius = 180;
let cageX, cageY;
let gameWon = false;
let particles = [];

function setup() {
    createCanvas(windowWidth, windowHeight);
    cageX = width / 2;
    cageY = height * 0.58;
    resetGame();
}

function resetGame() {
    monkeys = [];
    gameWon = false;
    particles = [];
    
    for (let i = 0; i < totalMonkeys; i++) {
        let angle = random(TWO_PI);
        let r = random(0, cageRadius - 30);
        monkeys.push({
            x: cageX + cos(angle) * r,
            y: cageY + sin(angle) * r,
            vx: random(-2.5, 2.5),
            vy: random(-2.5, 2.5),
            size: 22, 
            escaped: false,
            bounceTimer: random(100)
        });
    }
}

function draw() {
    background(4, 8, 20, 40); 
    
    // 1. ZIRKUSZELT ZEICHNEN
    drawCircusTent();

    // 2. FREUDE-PARTIKEL (Konfetti)
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1; 
        p.alpha -= 3;
        
        push();
        fill(p.color[0], p.color[1], p.color[2], p.alpha);
        noStroke();
        translate(p.x, p.y);
        rotate(p.rot);
        rect(-p.size/2, -p.size/2, p.size, p.size);
        pop();
        
        if (p.alpha <= 0) particles.splice(i, 1);
    }

    // 3. AFFEN ANIMIEREN & ZEICHNEN
    let activeMonkeys = 0;
    
    for (let m of monkeys) {
        if (!m.escaped) {
            activeMonkeys++;
            
            m.x += m.vx;
            m.y += m.vy;
            
            let d = dist(m.x, m.y, cageX, cageY);
            if (d > cageRadius - m.size) {
                let nx = (m.x - cageX) / d;
                let ny = (m.y - cageY) / d;
                let dot = m.vx * nx + m.vy * ny;
                m.vx = m.vx - 2 * dot * nx;
                m.vy = m.vy - 2 * dot * ny;
                m.x = cageX + nx * (cageRadius - m.size - 1);
                m.y = cageY + ny * (cageRadius - m.size - 1);
            }
            
            drawMonkey(m.x, m.y, m.size, false, m.bounceTimer);
        } else {
            m.x += m.vx * 1.6;
            m.y += m.vy * 1.6;
            
            drawMonkey(m.x, m.y, m.size, true, m.bounceTimer);
            
            if (random(1) < 0.05 && dist(m.x, m.y, cageX, cageY) < width) {
                createConfetti(m.x, m.y, 2);
            }
        }
        m.bounceTimer += 0.15;
    }
    
    if (activeMonkeys === 0 && !gameWon) {
        gameWon = true;
        createConfetti(width / 2, height / 2, 100); 
    }

    // 4. VISIER / SIEG
    if (!gameWon) {
        noFill();
        stroke(255, 183, 3, 150);
        strokeWeight(1.5);
        ellipse(mouseX, mouseY, 30);
        ellipse(mouseX, mouseY, 6);
    } else {
        push();
        textAlign(CENTER, CENTER);
        fill(255, 183, 3);
        textSize(24);
        text("CIRCUS EMPTY. FREEDOM RESTORED! 🎉🐒", width / 2, height * 0.55);
        textSize(14);
        fill(92, 105, 122);
        text("Click anywhere to close the loop and restart.", width / 2, height * 0.60);
        pop();
    }
}

function drawCircusTent() {
    push();
    fill(18, 24, 41, 120);
    stroke(230, 50, 50, 100); 
    strokeWeight(3);
    ellipse(cageX, cageY, cageRadius * 2);

    let roofTopY = cageY - cageRadius - 40;
    noStroke();
    
    for (let i = -cageRadius; i < cageRadius; i += 40) {
        if ((i / 40) % 2 === 0) {
            fill(230, 50, 50); 
        } else {
            fill(245, 245, 245); 
        }
        triangle(cageX, roofTopY, cageX + i, cageY - cageRadius + 10, cageX + i + 40, cageY - cageRadius + 10);
    }
    
    fill(255, 183, 3);
    triangle(cageX, roofTopY, cageX + 15, roofTopY + 5, cageX, roofTopY + 10);
    stroke(255, 183, 3);
    strokeWeight(2);
    line(cageX, roofTopY, cageX, roofTopY + 15);
    pop();
}

function drawMonkey(x, y, size, isHappy, timer) {
    push();
    translate(x, y);
    
    let bounce = sin(timer) * 2;
    rotate(sin(timer * 0.5) * 0.1);

    let bodyColor = isHappy ? color(160, 100, 65) : color(110, 70, 45);
    let faceColor = isHappy ? color(245, 200, 170) : color(210, 170, 140);
    
    noFill();
    stroke(bodyColor);
    strokeWeight(3);
    let tailWiggle = sin(timer) * 5;
    bezier(0, size/2, -10 + tailWiggle, size/2 + 10, -20, size/2, -18 - tailWiggle, size/4);

    noStroke();
    fill(bodyColor);
    ellipse(-size/2 - 2, bounce, size * 0.5, size * 0.5); 
    ellipse(size/2 + 2, bounce, size * 0.5, size * 0.5);  
    fill(faceColor);
    ellipse(-size/2 - 2, bounce, size * 0.25, size * 0.25);
    ellipse(size/2 + 2, bounce, size * 0.25, size * 0.25);

    fill(bodyColor);
    ellipse(0, bounce, size, size); 

    fill(faceColor);
    ellipse(-size * 0.18, bounce - size * 0.05, size * 0.45, size * 0.45);
    ellipse(size * 0.18, bounce - size * 0.05, size * 0.45, size * 0.45);
    ellipse(0, bounce + size * 0.15, size * 0.65, size * 0.5);

    fill(20);
    if (isHappy) {
        stroke(20);
        strokeWeight(1.5);
        noFill();
        arc(-size * 0.18, bounce - size * 0.05, 5, 5, PI, TWO_PI);
        arc(size * 0.18, bounce - size * 0.05, 5, 5, PI, TWO_PI);
    } else {
        ellipse(-size * 0.18, bounce - size * 0.05, 3.5, 3.5);
        ellipse(size * 0.18, bounce - size * 0.05, 3.5, 3.5);
    }

    noStroke();
    if (isHappy) {
        fill(220, 60, 60);
        arc(0, bounce + size * 0.12, 10, 10, 0, PI); 
    } else {
        stroke(50);
        strokeWeight(1.5);
        line(-3, bounce + size * 0.18, 3, bounce + size * 0.18); 
    }

    pop();
}

function createConfetti(x, y, count) {
    let colors = [[255, 183, 3], [0, 245, 255], [255, 50, 100], [100, 255, 100]];
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x,
            y: y,
            vx: random(-5, 5),
            vy: random(-6, -1),
            size: random(4, 9),
            color: random(colors),
            alpha: 255,
            rot: random(TWO_PI)
        });
    }
}

function mousePressed() {
    if (gameWon) {
        resetGame();
        return;
    }
    
    for (let m of monkeys) {
        if (!m.escaped) {
            let d = dist(mouseX, mouseY, m.x, m.y);
            if (d < m.size) {
                m.escaped = true;
                
                let edx = m.x - cageX;
                let edy = m.y - cageY;
                let edist = Math.sqrt(edx*edx + edy*edy);
                
                m.vx = (edx / edist) * 8 + random(-2, 2);
                m.vy = (edy / edist) * 8 + random(-2, 2);
                
                createConfetti(m.x, m.y, 20);
                break; 
            }
        }
    }
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    cageX = width / 2;
    cageY = height * 0.58;
}
</script>

</body>
</html>
